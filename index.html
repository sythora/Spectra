<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proxy</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <header class="top">
    <div class="title">PROXY</div>

    <form id="idk" class="searchbar">
      <input id="url" type="text" placeholder="Enter URL or search..." autocomplete="off"/>
      
      <select id="proxysel">
        <option value="uv">UV</option>
        <option value="scramjet">Scramjet</option>
      </select>

      <button type="submit">Go</button>
    </form>
  </header>

  <main class="view">
    <iframe id="iframe"></iframe>

    <div id="placeholder" class="placeholder">
      enter a url to start
    </div>
  </main>


  <script src="/scram/scramjet.all.js"></script>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script type="module" src="/baremux.mjs"></script>
  <script type="module" src="/stuff.js"></script>

</body>
</html>
